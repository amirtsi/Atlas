# Obsidian projection overlay for the Atlas app stack.
#
# Mounts a (Syncthing-synced) Obsidian vault into the backend container and
# turns the export on. Set ATLAS_OBSIDIAN_VAULT_DIR to the vault path on the
# host, then run BOTH files:
#
#   ATLAS_OBSIDIAN_VAULT_DIR=/home/pi/ObsidianVault \
#   docker compose -f docker-compose.yml -f docker-compose.obsidian.yml up -d --build
services:
  atlas-backend:
    environment:
      ATLAS_OBSIDIAN_VAULT: /vault
    volumes:
      - ${ATLAS_OBSIDIAN_VAULT_DIR:?set ATLAS_OBSIDIAN_VAULT_DIR to your vault path}:/vault
