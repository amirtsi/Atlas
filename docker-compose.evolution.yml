# Evolution API (WhatsApp bridge) for Atlas.
# Evolution v2 needs a database (Postgres) and a cache (Redis).
#
#   cp .env.evolution.example .env.evolution   # then edit the API key
#   docker compose -f docker-compose.evolution.yml --env-file .env.evolution up -d
#
# Then open the Manager UI to create the "atlas" instance and scan the QR:
#   http://127.0.0.1:8083/manager   (log in with your EVOLUTION_API_KEY)
#
# The three values Atlas needs afterward:
#   base_url = http://127.0.0.1:8083   instance = atlas   api_key = EVOLUTION_API_KEY

services:
  evolution-api:
    # Official image namespace per docs.evolutionfoundation.com.br (evoapicloud).
    image: ${EVOLUTION_IMAGE:-evoapicloud/evolution-api:v2.3.7}
    container_name: atlas-evolution
    restart: unless-stopped
    ports:
      # Host port is configurable — 8081 is used by ParkNet, so default to 8083.
      - "${EVOLUTION_PORT:-8083}:8080"
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://127.0.0.1:8083}
      # The only hard-required variable.
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      # Persist instances/messages in Postgres
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@evolution-postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: atlas_evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      # Cache in Redis
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/6
      CACHE_REDIS_PREFIX_KEY: atlas_evolution
      CACHE_LOCAL_ENABLED: "false"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - evolution-postgres
      - evolution-redis

  evolution-postgres:
    image: postgres:16-alpine
    container_name: atlas-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data

  evolution-redis:
    image: redis:7-alpine
    container_name: atlas-evolution-redis
    restart: unless-stopped
    volumes:
      - evolution_redis:/data

volumes:
  evolution_instances:
  evolution_pgdata:
  evolution_redis:
