name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (with dev + mcp extras)
        run: pip install -e ".[dev,mcp]"
      - name: Ruff (lint)
        run: ruff check app tests
      - name: Mypy (type check — advisory)
        run: mypy app
        continue-on-error: true
      - name: Pytest
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: ESLint (advisory)
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
